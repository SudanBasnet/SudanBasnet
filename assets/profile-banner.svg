<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Sudan Basnet profile banner</title>
  <desc id="description">Enterprise support and full-stack engineering profile banner</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="20" x2="1120" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08090D"/>
      <stop offset="0.5" stop-color="#11101B"/>
      <stop offset="1" stop-color="#07110E"/>
    </linearGradient>
    <linearGradient id="accent" x1="136" y1="100" x2="692" y2="245" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CAFF3D"/>
      <stop offset="0.55" stop-color="#8FEA72"/>
      <stop offset="1" stop-color="#8F72FF"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientTransform="translate(978 170) rotate(138) scale(137)">
      <stop stop-color="#F3FFD0"/>
      <stop offset="0.22" stop-color="#CAFF3D"/>
      <stop offset="0.58" stop-color="#50680D"/>
      <stop offset="1" stop-color="#12170B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" fill="url(#grid)"/>

  <circle cx="965" cy="172" r="152" fill="#8F72FF" fill-opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="1000" cy="175" r="123" fill="#CAFF3D" fill-opacity="0.11" filter="url(#softGlow)"/>
  <circle cx="978" cy="170" r="102" fill="url(#orb)" opacity="0.92"/>
  <ellipse cx="978" cy="170" rx="145" ry="49" transform="rotate(-18 978 170)" stroke="#CAFF3D" stroke-opacity="0.7" stroke-width="1.5"/>
  <ellipse cx="978" cy="170" rx="154" ry="55" transform="rotate(52 978 170)" stroke="#8F72FF" stroke-opacity="0.72" stroke-width="1.5"/>
  <ellipse cx="978" cy="170" rx="133" ry="43" transform="rotate(112 978 170)" stroke="#FFFFFF" stroke-opacity="0.21"/>
  <circle cx="1111" cy="91" r="5" fill="#CAFF3D" filter="url(#glow)"/>
  <circle cx="858" cy="255" r="4" fill="#8F72FF" filter="url(#glow)"/>
  <circle cx="1080" cy="280" r="3" fill="#FFFFFF" fill-opacity="0.75"/>

  <rect x="72" y="62" width="178" height="28" rx="14" fill="#CAFF3D" fill-opacity="0.08" stroke="#CAFF3D" stroke-opacity="0.28"/>
  <circle cx="90" cy="76" r="4" fill="#CAFF3D" filter="url(#glow)"/>
  <text x="103" y="80" fill="#CAFF3D" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="1.8">SYDNEY / AUSTRALIA</text>

  <text x="70" y="162" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" letter-spacing="-2">SUDAN</text>
  <text x="70" y="225" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" letter-spacing="-2">BASNET</text>
  <text x="74" y="263" fill="#FFFFFF" fill-opacity="0.62" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="3">ENTERPRISE SUPPORT × FULL-STACK ENGINEERING</text>

  <line x1="72" y1="298" x2="688" y2="298" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="73" y="326" fill="#FFFFFF" fill-opacity="0.42" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" letter-spacing="1.8">RESOLVE THE ISSUE</text>
  <circle cx="207" cy="322" r="3" fill="#CAFF3D"/>
  <text x="224" y="326" fill="#FFFFFF" fill-opacity="0.42" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" letter-spacing="1.8">TRACE THE SYSTEM</text>
  <circle cx="365" cy="322" r="3" fill="#8F72FF"/>
  <text x="382" y="326" fill="#FFFFFF" fill-opacity="0.42" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" letter-spacing="1.8">BUILD THE BETTER PATH</text>
</svg>
