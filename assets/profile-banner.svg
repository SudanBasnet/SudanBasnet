<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title description">
  <title id="title">Sudan Basnet — Enterprise Support and Full-Stack Engineering</title>
  <desc id="description">A dark technical banner introducing Sudan Basnet as a desktop support engineer and full-stack developer in Sydney.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08080a"/>
      <stop offset=".52" stop-color="#111218"/>
      <stop offset="1" stop-color="#09090d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff62aa"/>
      <stop offset=".48" stop-color="#8f72ff"/>
      <stop offset="1" stop-color="#caff3d"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientTransform="translate(1300 40) rotate(130) scale(520)">
      <stop stop-color="#ff62aa" stop-opacity=".3"/>
      <stop offset="1" stop-color="#ff62aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(110 390) rotate(-35) scale(560)">
      <stop stop-color="#8f72ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#8f72ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#fff" stroke-opacity=".045"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1600" height="430" rx="28" fill="url(#background)"/>
  <rect width="1600" height="430" rx="28" fill="url(#grid)"/>
  <rect width="1600" height="430" rx="28" fill="url(#pinkGlow)"/>
  <rect width="1600" height="430" rx="28" fill="url(#violetGlow)"/>

  <circle cx="1325" cy="206" r="164" fill="none" stroke="#ff62aa" stroke-opacity=".2"/>
  <circle cx="1325" cy="206" r="112" fill="none" stroke="#8f72ff" stroke-opacity=".28"/>
  <circle cx="1325" cy="206" r="59" fill="#caff3d" fill-opacity=".08" stroke="#caff3d" stroke-opacity=".55"/>
  <path d="M1138 206h374M1325 19v374" stroke="#fff" stroke-opacity=".07"/>
  <circle cx="1213" cy="206" r="8" fill="#ff62aa"/>
  <circle cx="1437" cy="206" r="8" fill="#8f72ff"/>
  <circle cx="1325" cy="94" r="8" fill="#caff3d"/>

  <rect x="88" y="70" width="254" height="34" rx="17" fill="#fff" fill-opacity=".06" stroke="#fff" stroke-opacity=".15"/>
  <circle cx="110" cy="87" r="5" fill="#caff3d"/>
  <text x="128" y="92" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2">SYDNEY · AUSTRALIA</text>

  <text x="88" y="190" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="-3">SUDAN BASNET</text>
  <rect x="88" y="216" width="680" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="88" y="279" fill="#ff79b7" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="4">DESKTOP SUPPORT ENGINEER</text>
  <text x="88" y="322" fill="#b9a8ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="4">FULL-STACK DEVELOPER</text>
  <text x="88" y="374" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="1.3">Enterprise reliability · Traceable systems · Practical products</text>

  <rect x="1.5" y="1.5" width="1597" height="427" rx="26.5" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="3"/>
</svg>
