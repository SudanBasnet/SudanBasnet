<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 250" role="img" aria-labelledby="title description">
  <title id="title">Problem-solving workflow</title>
  <desc id="description">Six connected stages: reproduce, trace, isolate, fix, validate, and document.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#13141b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff62aa"/>
      <stop offset=".5" stop-color="#8f72ff"/>
      <stop offset="1" stop-color="#caff3d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="250" rx="24" fill="url(#background)"/>
  <path d="M155 125H1445" stroke="#fff" stroke-opacity=".09" stroke-width="12" stroke-linecap="round"/>
  <path d="M155 125H1445" stroke="url(#line)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <g transform="translate(155 125)">
      <circle r="42" fill="#15161d" stroke="#ff62aa" stroke-width="3"/>
      <text y="7" fill="#ff62aa" font-size="22" font-weight="800">01</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">REPRODUCE</text>
    </g>
    <g transform="translate(413 125)">
      <circle r="42" fill="#15161d" stroke="#d66bd2" stroke-width="3"/>
      <text y="7" fill="#e675d9" font-size="22" font-weight="800">02</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">TRACE</text>
    </g>
    <g transform="translate(671 125)">
      <circle r="42" fill="#15161d" stroke="#a874f4" stroke-width="3"/>
      <text y="7" fill="#b989ff" font-size="22" font-weight="800">03</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">ISOLATE</text>
    </g>
    <g transform="translate(929 125)">
      <circle r="42" fill="#15161d" stroke="#7378f2" stroke-width="3"/>
      <text y="7" fill="#8f92ff" font-size="22" font-weight="800">04</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">FIX</text>
    </g>
    <g transform="translate(1187 125)">
      <circle r="42" fill="#15161d" stroke="#94bca2" stroke-width="3"/>
      <text y="7" fill="#a8d9ad" font-size="22" font-weight="800">05</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">VALIDATE</text>
    </g>
    <g transform="translate(1445 125)">
      <circle r="42" fill="#15161d" stroke="#caff3d" stroke-width="3"/>
      <text y="7" fill="#caff3d" font-size="22" font-weight="800">06</text>
      <text y="78" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="1.5">DOCUMENT</text>
    </g>
  </g>

  <rect x="1.5" y="1.5" width="1597" height="247" rx="22.5" fill="none" stroke="#fff" stroke-opacity=".1" stroke-width="3"/>
</svg>
