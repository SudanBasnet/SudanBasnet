<svg width="1200" height="180" viewBox="0 0 1200 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Sudan Basnet problem-solving workflow</title>
  <desc id="description">A workflow from user signal through reproduction, tracing, isolation, fixing, validation, and documentation</desc>
  <defs>
    <linearGradient id="line" x1="90" y1="90" x2="1110" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8F72FF"/><stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.35"/><stop offset="1" stop-color="#CAFF3D"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="180" rx="22" fill="#0B0C10"/>
  <rect x="1" y="1" width="1198" height="178" rx="21" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M104 88H1094" stroke="url(#line)" stroke-width="2" stroke-dasharray="6 8"/>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <g><circle cx="105" cy="88" r="22" fill="#8F72FF" fill-opacity="0.17" stroke="#8F72FF"/><circle cx="105" cy="88" r="5" fill="#8F72FF" filter="url(#glow)"/><text x="105" y="137" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="1.2">USER SIGNAL</text></g>
    <g><circle cx="270" cy="88" r="22" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.25"/><text x="270" y="93" fill="#FFFFFF" font-size="13" font-weight="700">01</text><text x="270" y="137" fill="#FFFFFF" fill-opacity="0.62" font-size="11" font-weight="700" letter-spacing="1.2">REPRODUCE</text></g>
    <g><circle cx="435" cy="88" r="22" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.25"/><text x="435" y="93" fill="#FFFFFF" font-size="13" font-weight="700">02</text><text x="435" y="137" fill="#FFFFFF" fill-opacity="0.62" font-size="11" font-weight="700" letter-spacing="1.2">TRACE</text></g>
    <g><circle cx="600" cy="88" r="22" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.25"/><text x="600" y="93" fill="#FFFFFF" font-size="13" font-weight="700">03</text><text x="600" y="137" fill="#FFFFFF" fill-opacity="0.62" font-size="11" font-weight="700" letter-spacing="1.2">ISOLATE</text></g>
    <g><circle cx="765" cy="88" r="22" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.25"/><text x="765" y="93" fill="#FFFFFF" font-size="13" font-weight="700">04</text><text x="765" y="137" fill="#FFFFFF" fill-opacity="0.62" font-size="11" font-weight="700" letter-spacing="1.2">FIX</text></g>
    <g><circle cx="930" cy="88" r="22" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.25"/><text x="930" y="93" fill="#FFFFFF" font-size="13" font-weight="700">05</text><text x="930" y="137" fill="#FFFFFF" fill-opacity="0.62" font-size="11" font-weight="700" letter-spacing="1.2">VALIDATE</text></g>
    <g><circle cx="1095" cy="88" r="22" fill="#CAFF3D" fill-opacity="0.14" stroke="#CAFF3D"/><circle cx="1095" cy="88" r="5" fill="#CAFF3D" filter="url(#glow)"/><text x="1095" y="137" fill="#CAFF3D" font-size="11" font-weight="700" letter-spacing="1.2">DOCUMENT</text></g>
  </g>
</svg>
